<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Planevo — App pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Geist', system-ui, sans-serif; }
  em { font-style: italic; }
  #root { width: 100%; min-height: 100vh; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="app-screens.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const { DashboardScreen, DailyPlanScreen, TasksScreen, CalendarScreen, SettingsScreen } = window;

    function App() {
      return (
        <DesignCanvas
          title="Planevo · App pages"
          subtitle="Redesign of dashboard, daily plan, tasks, calendar — sharing the landing page's visual system"
        >
          <DCSection
            id="app"
            title="Core app screens"
            subtitle="Cream + ink · Instrument Serif headlines · honey/sage accents · dark sidebar"
          >
            <DCArtboard id="dashboard" label="01 · Dashboard" width={1440} height={940}>
              <DashboardScreen />
            </DCArtboard>
            <DCArtboard id="daily" label="02 · Daily Plan" width={1440} height={940}>
              <DailyPlanScreen />
            </DCArtboard>
            <DCArtboard id="tasks" label="03 · Tasks" width={1440} height={940}>
              <TasksScreen />
            </DCArtboard>
            <DCArtboard id="calendar" label="04 · Calendar" width={1440} height={940}>
              <CalendarScreen />
            </DCArtboard>
            <DCArtboard id="settings" label="05 · Settings" width={1440} height={1180}>
              <SettingsScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
