name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: planevo

jobs:
  web:
    name: Web — lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      OPENAI_API_KEY: sk-placeholder
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: planevo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace planevo

      - name: Typecheck
        run: npm run typecheck --workspace planevo

      - name: Test
        run: npm run test --workspace planevo

      - name: Build
        run: npm run build --workspace planevo

  mobile:
    name: Mobile — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: planevo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace mobile

      - name: Typecheck
        run: npm run typecheck --workspace mobile

      - name: Test
        run: npm run test --workspace mobile
