name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    name: Web — lint, typecheck, test, build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      OPENAI_API_KEY: sk-placeholder
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace planevo

      - name: Typecheck
        run: npm run typecheck --workspace planevo

      - name: Test with coverage
        run: npm run test:coverage --workspace planevo
        env:
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Dependency audit
        run: node scripts/ci-audit.mjs

      - name: Secret pattern grep
        run: node scripts/ci-secret-grep.mjs

      - name: API route validation
        run: node scripts/ci-route-validation.mjs

      - name: OpenAPI drift check
        run: node scripts/ci-openapi-drift.mjs

      - name: Build
        run: npm run build --workspace planevo

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/web

      - name: E2E smoke, security, and accessibility
        run: npm run test:e2e --workspace planevo
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Lighthouse accessibility audit
        run: npx start-server-and-test "npm run start --workspace planevo" http://localhost:3000 "npm run test:lighthouse --workspace planevo"

  mobile:
    name: Mobile — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace mobile

      - name: Typecheck
        run: npm run typecheck --workspace mobile

      - name: Test
        run: npm run test --workspace mobile
